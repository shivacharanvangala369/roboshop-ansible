- name: craete Ec2 and Route53 records
  hosts: all
  connection: local
  vars:
    sg_id: sg-0643d1da123417a9c
    ami_id: ami-0220d79f3f480ecf5
    env: dev
    domain_name: devcops.online
    instances:
    - mongodb
    - catalogue
    - redis
    - user
  tasks:
  - name: Create Ec2 instances
    amazon.aws.ec2_instance:
      instance_type: "t3.micro" 
      security_group: "{{ sg_id }}"  
      image_id: "{{ ami_id }}"
      name: "{{ item }}-{{ env }}"
      tags:
        Project: roboshop
        Component: "{{ item }}"
        Env: "{{ env}}"
        Name: "{{ item }}-{{ env }}"
    loop: "{{ instances }}"
    register: ec2_output

  - name: print output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"
  
  - name: Create Route53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ item.item }}-{{ env }}.{{ domain_name}}"  #mongodb-dev-devops.online 
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results }}"

  # - name: Create Route53 records
  #   amazon.aws.route53:
  #     state: present
  #     zone: "{{ domain_name }}"
  #     record: "roboshop-{{ env }}.{{ domain_name}}"  # roboshop-dev-devcops.online
