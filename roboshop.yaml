- name: craete Ec2 and Route53 records
  hosts: all
  connection: local
  vars:
    sg_id: sg-0643d1da123417a9c
    ami_id: ami-0220d79f3f480ecf5
    envirolment: dev
    domain_name: devcops.online
    instances:
    - mongodb
    - catalogue
  tasks:
  - name: Create Ec2 instances
    amazon.aws.ec2_instance:
      instance_type: "t3.micro" 
      security_group: "{{ sg_id }}"  
      image_id: "{{ ami_id }}"
      name: "{{ item }}-{{ envirolment }}"
      tags:
        project: roboshop
        component: "{{ item }}"
        envirolment: "{{ envirolment}}"
        NAME: "{{ item }}-{{ envirolment }}"
    loop: "{{ instances }}"
    register: ec2_output

  - name: print output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"
  
  - name: Create Route53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ item.item }}-{{ env }}.{{ domain_name}}"
      type: A
      ttl: 1
      value: "{{ item.instance[0].private_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results }}"