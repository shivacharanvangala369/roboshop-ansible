- name: configure rabbitmq server
  hosts: rabbitmq
  become: yes
  tasks:
  - name: Setup the RabbitMQ repo file.
    ansible.builtin.copy:
      src: rabbitmq.repo
      dest: /etc/yum.repos.d/rabbitmq.repo

  - name: Install RabbitMQ
    ansible.builtin.package:
      name: rabbitmq-server
      state: present

  - name: Start service RabbitMQ
    ansible.builtin.service:
      name: rabbitmq
      enabled: yes
      state: restarted

  - name: Chnage RabbitMQ default username / password
    community.rabbitmq.rabbitmq_user: rabbitmqctl add_user roboshop roboshop123
      user: "roboshop"
      password: roboshop123
      permissions:
        - vhost: /
          configure_priv: .*
          read_priv: .*
          write_priv: .*
      state: present
      



  