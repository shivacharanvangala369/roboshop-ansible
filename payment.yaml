- name: configure payment server
  hosts: payment
  become: yes
  tasks:
  - name: Install Python 3
    ansible.builtin.package:
      name: "{{ item }}"
      state: present
    loop:
    - python3 
    - gcc 
    - python3-devel

  - name: create system user roboshop
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name: delete a app DIR
    ansible.builtin.file:
      path: /app
      state: absent


  - name: Create a app DIR
    ansible.builtin.file:
      path: /app
      state: directory

  - name: delete payment code
    ansible.builtin.file:
      path: /tmp/payment.zip
      state: absent
  
  - name: Download payment code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip 
      dest: /tmp/payment.zip

  
  - name: Unarchive payment.zip
    ansible.builtin.unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes

  - name: Lets download the dependencies.
    ansible.builtin.pip:
      requirements: /requirements.txt
      executable: pip3.9

  - name: Copy file to payment.service
    ansible.builtin.template:
      src: payment.service
      dest: /etc/systemd/system/payment.service

  - name: demon-reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: Start service payment
    ansible.builtin.service:
      name: payment
      enabled: yes
      state: restarted

      