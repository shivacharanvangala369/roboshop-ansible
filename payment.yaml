- name: configure payment server
  hosts: payment
  become: yes
  tasks:
  - name: Install Python 3
    ansible.builtin.package:
      name:
        - python3 
        - gcc 
        - python3-devel
      state: present

  - name: create system user roboshop
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name: Create a app DIR
    ansible.builtin.file:
      path: /app
      state: directory
  
  - name: Download payment code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip 
      dest: /tmp/payment.zip

  - name: cd /app
    ansible.builtin.command: cd /app 
  
  - name: Unarchive payment.zip
    ansible.builtin.unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes

  - name: Lets download the dependencies.
     ansible.builtin.pip:
      requirements: /app/requirements.txt
      virtualenv: /app

  - name: Copy file to payment.service
    ansible.builtin.copy:
      src: payment.service
      dest: /etc/systemd/system/payment.service

  - name: Start service payment
    ansible.builtin.service:
      daemon_reload: true
      name: payment
      enabled: yes
      state: started

      