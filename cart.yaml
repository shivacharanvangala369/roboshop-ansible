- name: configure cart server
  hosts: cart
  become: yes
  tasks:
  - name: enable nodejs:20
    ansible.builtin.command:  dnf module enable nodejs:20 -y
  
  - name: Install NodeJS
    ansible.builtin.dnf:
      name: nodejs
      state: present

  - name: create system user roboshop
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name: delete a app DIR
    ansible.builtin.file:
      path: /app
      state: absent

  - name: Create a app DIR
    ansible.builtin.file:
      path: /app
      state: directory

  - name: delete cart code
    ansible.builtin.file:
      path: /tmp/cart.zip
      state: absent

  - name: Download cart code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip 
      dest: /tmp/cart.zip

  - name: Unarchive cart.zip
    ansible.builtin.unarchive:
      src: /tmp/cart.zip
      dest: /app
      remote_src: yes

  - name: npm install dependencies
    community.general.npm:
      path: /app

  - name: Copy file to cart.service
    ansible.builtin.template:
      src: cart.service
      dest: /etc/systemd/system/cart.service

  - name: demon-reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: restart cart service
    ansible.builtin.service:
      name: cart
      enabled: yes
      state: restarted
      