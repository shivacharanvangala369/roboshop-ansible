- name: configure shipping server
  hosts: shipping
  become: yes
  tasks:
  - name: dnf install maven -y
    ansible.builtin.package:
      name: maven
      state: present

  - name: create system user roboshop
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name: Create a app DIR
    ansible.builtin.file:
      path: /app
      state: directory

  - name: Download shipping code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip 
      dest: /tmp/shipping.zip

  - name: cd /app
    ansible.builtin.command: cd /app 
  
  - name: Unarchive shipping.zip
    ansible.builtin.unarchive:
      src: /tmp/shipping.zip
      dest: /app
      remote_src: yes

    - name: mvn clean package 
    ansible.builtin.command: mvn clean package 

  - name: Rename file from  target/shipping-1.0.jar shipping.jar
    ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar

  - name: Copy file to shipping.service
    ansible.builtin.copy:
      src: shipping.service
      dest: /etc/systemd/system/shipping.service

  - name: Start service shipping
    ansible.builtin.service:
      daemon_reload: true
      name: shipping
      enabled: yes
      state: started

  - name: dnf install mysql -y 
    ansible.builtin.package:
      name: mysql
      state: present

  - name: Load Schema
    ansible.builtin.shell: mysql -h mysql-dev.devcops.online -uroot -pRoboShop@1 < /app/db/schema.sql

  - name: Create app user, MySQL expects a password authentication
    ansible.builtin.shell: mysql -h mysql-dev.devcops.online -uroot -pRoboShop@1 < /app/db/app-user.sql 

  - name: Load Master Data
    ansible.builtin.shell: mysql -h mysql-dev.devcops.online -uroot -pRoboShop@1 < /app/db/master-data.sql

  - name: reStart service shipping
    ansible.builtin.service:
      name: shipping
      state: restarted