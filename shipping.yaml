- name: configure shipping server
  hosts: shipping
  become: yes
  tasks:
  - name: dnf install maven -y and mysql
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: present
    loop:
    - maven
    - mysql

  - name: create system user roboshop
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name: delete a app DIR
    ansible.builtin.file:
      path: /app
      state: absent

  - name: Create a app DIR
    ansible.builtin.file:
      path: /app
      state: directory

  - name: delete shipping code
    ansible.builtin.file:
      path: /tmp/shipping.zip
      state: absent

  - name: Download shipping code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip 
      dest: /tmp/shipping.zip

  
  - name: Unarchive shipping.zip
    ansible.builtin.unarchive:
      src: /tmp/shipping.zip
      dest: /app
      remote_src: yes

  - name: mvn clean package 
    ansible.builtin.command: mvn clean package
    args:
        chdir: /app

  - name: Rename file from  target/shipping-1.0.jar shipping.jar
    ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar
    args:
        chdir: /app

  - name: Copy file to shipping.service
    ansible.builtin.template:
      src: shipping.service
      dest: /etc/systemd/system/shipping.service

  - name: demon-reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: install dependencies
    ansible.builtin.pip:
      name: "{{ item }}"
      executable: pip3.9
    loop:
    - cryptography
    - PyMySQL
      
  - name: import shipping data
    community.mysql.mysql_db:
      state: import
      name: all
      login_host: "{{ MYSQL_HOST }}"
      login_user: root
      login_password: RoboShop@1
      target: "{{ item }}"
    loop:
    - /app/db/schema.sql
    - /app/db/app-user.sql 
    - /app/db/master-data.sql


  - name: Start service shipping
    ansible.builtin.service:
      name: shipping
      enabled: yes
      state: restarted