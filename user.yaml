- name: configure user server
  hosts: user
  become: yes
  tasks:
  - name: enable nodejs:20
    ansible.builtin.command:  dnf module enable nodejs:20 -y
  
  - name: Install NodeJS
    ansible.builtin.dnf:
      name: nodejs
      state: present

  - name: create system user roboshop
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name: delete a app DIR
    ansible.builtin.file:
      path: /app
      state: absent

  - name: Create a app DIR
    ansible.builtin.file:
      path: /app
      state: directory

  - name: delete user code
    ansible.builtin.file:
      path: /tmp/user.zip
      state: absent

  - name: Download user code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip 
      dest: /tmp/user.zip

  
  - name: Unarchive user.zip
    ansible.builtin.unarchive:
      src: /tmp/user.zip
      dest: /app
      remote_src: yes

  - name: npm install dependencies
    community.general.npm:
      path: /app

  - name: Copy file to user.service
    ansible.builtin.copy:
      src: user.service
      dest: /etc/systemd/system/user.service

  - name: restart user service
    ansible.builtin.service:
      daemon_reload: true
      name: user
      enabled: yes
      state: restarted
      