- name: configure catalogue server
  hosts: catalogue
  become: yes
  tasks:
  - name: enable nodejs:20
    ansible.builtin.command:  dnf module enable nodejs:20 -y
  
  - name: Install NodeJS
    ansible.builtin.dnf:
      name: nodejs
      state: present



  - name: create system user roboshop
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name: Create a app DIR
    ansible.builtin.file:
      path: /app
      state: directory
  
  - name: Download catalogue code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip 
      dest: /tmp/catalogue.zip

  - name: cd /app
    ansible.builtin.command: cd /app 
  
  - name: Unarchive catalogue.zip
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes
      

  - name: cd /app
    ansible.builtin.command: npm install

  - name: Copy file to catalogue.service
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service

  - name: Start service mongodb
    ansible.builtin.service:
      daemon_reload: true
      name: mongod
      enabled: yes
      state: started

  - name: Copy file to mongo.repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: Install mongodb-mongosh
    ansible.builtin.dnf:
      name: mongodb-mongosh
      state: present

  - name: Load MongoDB master data
    ansible.builtin.shell: mongosh --host {{ mongodb-dev.devcops.online }} < /app/db/master-data.js

  - name:  check data is loaded into mongodb or not Connect to MongoDB
    ansible.builtin.shell: mongosh --host mongodb-dev.devcops.online

    