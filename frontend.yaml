- name: configure frontend server
  hosts: frontend
  become: yes
  tasks:
  - name: dnf module enable nginx:1.24 -y
    ansible.builtin.command: dnf module enable nginx:1.24 -y

  - name: dnf install nginx -y
    ansible.builtin.package:
      name: nginx
      state: present

  - name: Start service nginx
    ansible.builtin.service:
      daemon_reload: true
      name: nginx
      enabled: yes
      state: started

  - name: Remove all files from nginx html directory
    ansible.builtin.shell: rm -rf /usr/share/nginx/html/*

  - name: Download frontend code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/frontend-v3.zip 
      dest: /tmp/frontend.zip

  - name: cd /usr/share/nginx/html 
    ansible.builtin.shell: cd /usr/share/nginx/html 

  - name: Unarchive frontend.zip
    ansible.builtin.unarchive:
      src: /tmp/frontend.zip
      dest: /usr/share/nginx/html 
      remote_src: yes

  - name: Copy file Nginx Reverse Proxy Configuration
    ansible.builtin.copy:
      src: nginx.conf
      dest: /etc/nginx/nginx.conf

  - name: Restart service nginx
    ansible.builtin.service:
      name: nginx
      state: restarted